# School Bus Management - Docker Compose (local MySQL optional)
# For AWS RDS, run backend locally with .env pointing at RDS instead.

services:
  mysql:
    image: mysql:8.4
    container_name: schoolbus-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: vidya_db
      MYSQL_USER: vidya
      MYSQL_PASSWORD: vidya
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - schoolbus-net

  backend:
    build:
      context: ./school-management-backend
      dockerfile: Dockerfile
    container_name: schoolbus-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/vidya_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: vidya
      DB_PASSWORD: vidya
      DB_SCHEMA: vidya_db
      JWT_SECRET: ChangeThisToAVeryLongSecureSecretKeyForProductionUseAtLeast256BitsLong!!
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - schoolbus-net

  frontend:
    build:
      context: ./school-management-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: schoolbus-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - schoolbus-net

volumes:
  mysql_data:

networks:
  schoolbus-net:
    driver: bridge
