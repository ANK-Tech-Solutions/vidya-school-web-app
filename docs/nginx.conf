# Replace bus.example.com, certificate paths, and upstream names for your environment.
upstream vidya_frontend {
    server frontend:3000;
    keepalive 32;
}

upstream vidya_backend {
    server backend:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name bus.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bus.example.com;

    ssl_certificate     /etc/letsencrypt/live/bus.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bus.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://vidya_backend;
    }

    location = /swagger-ui.html {
        proxy_pass http://vidya_backend;
    }

    location /swagger-ui/ {
        proxy_pass http://vidya_backend;
    }

    location = /api-docs {
        proxy_pass http://vidya_backend;
    }

    location /actuator/ {
        # Restrict this location to monitoring networks in production.
        proxy_pass http://vidya_backend;
    }

    location /ws/ {
        proxy_pass http://vidya_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://vidya_frontend;
        proxy_http_version 1.1;
    }
}
