spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    create-schemas: false
    schemas: ${DB_SCHEMA:vidya_db}
    default-schema: ${DB_SCHEMA:vidya_db}
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO
    com.schoolbus: DEBUG
