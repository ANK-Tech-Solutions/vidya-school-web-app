spring:
  config:
    activate:
      on-profile: prod

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 1
      connection-timeout: 20000

  jpa:
    show-sql: false
    properties:
      hibernate:
        # Fewer JDBC metadata round-trips to remote RDS during bootstrap
        temp.use_jdbc_metadata_defaults: false
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

logging:
  level:
    root: WARN
    com.schoolbus: INFO
    org.flywaydb: INFO
    org.hibernate: WARN
